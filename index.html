<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EvenSolitaire</title>
  <style>
    #perf-console-panel {
      position: fixed;
      right: 8px;
      bottom: 8px;
      width: min(760px, calc(100vw - 16px));
      max-height: 42vh;
      display: none;
      flex-direction: column;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      background: rgba(10, 10, 10, 0.92);
      color: #d8f7d0;
      font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      z-index: 2147483647;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    #perf-console-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-bottom: 1px solid #2a2a2a;
      background: rgba(24, 24, 24, 0.95);
    }

    #perf-console-title {
      font-weight: 600;
      color: #f0f0f0;
      margin-right: auto;
    }

    #perf-console-header button {
      border: 1px solid #4a4a4a;
      border-radius: 4px;
      background: #1b1b1b;
      color: #e6e6e6;
      padding: 2px 8px;
      cursor: pointer;
      font: inherit;
    }

    #perf-console-header button:hover {
      background: #262626;
    }

    #perf-console-output {
      margin: 0;
      padding: 8px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 90px;
      max-height: calc(42vh - 42px);
    }

    #perf-console-panel[data-collapsed="true"] #perf-console-output {
      display: none;
    }

    #perf-console-panel[data-collapsed="true"] {
      max-height: none;
      width: auto;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="perf-console-panel" data-collapsed="false" aria-live="polite">
    <div id="perf-console-header">
      <span id="perf-console-title">Perf Console</span>
      <button id="perf-console-toggle" type="button">Hide</button>
      <button id="perf-console-clear" type="button">Clear</button>
      <button id="perf-console-copy" type="button">Copy All</button>
      <button id="perf-console-download" type="button">Download</button>
    </div>
    <pre id="perf-console-output"></pre>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
